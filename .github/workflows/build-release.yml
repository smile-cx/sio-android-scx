name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.1.0)'
        required: true
        default: '2.1.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build release AAR
        run: ./scripts/build-release.sh
        env:
          UPSTREAM_VERSION: ${{ github.event.inputs.version }}

      - name: Verify AAR contents
        run: |
          echo "=== AAR Contents ==="
          unzip -l build/outputs/sio-android-scx-release.aar
          echo ""
          echo "=== Verifying package prefixes ==="
          # Extract shadow.jar from AAR and check for prefixed classes
          TEMP_DIR=$(mktemp -d)
          cd $TEMP_DIR
          unzip -q $GITHUB_WORKSPACE/build/outputs/sio-android-scx-release.aar libs/shadow.jar

          # Check for prefixed classes
          PREFIXED_COUNT=$(jar tf libs/shadow.jar | grep -c "cx/smile/" || echo "0")
          echo "Found $PREFIXED_COUNT prefixed classes (cx/smile/)"

          # Check for Socket.IO classes
          SOCKET_COUNT=$(jar tf libs/shadow.jar | grep -c "cx/smile/io/socket/" || echo "0")
          echo "Socket.IO classes: $SOCKET_COUNT"

          # Sample of prefixed classes
          echo ""
          echo "=== Sample Prefixed Classes ==="
          jar tf libs/shadow.jar | grep "cx/smile/io/socket/client" | head -10

          # Check for unprefixed classes (should be empty)
          echo ""
          echo "=== Checking for unprefixed classes (should be empty) ==="
          UNPREFIXED=$(jar tf libs/shadow.jar | grep -E "^(io/socket|io/engine|okhttp3|okio)/" || echo "")
          if [ -z "$UNPREFIXED" ]; then
            echo "✓ No unprefixed classes found"
          else
            echo "✗ ERROR: Found unprefixed classes:"
            echo "$UNPREFIXED"
            exit 1
          fi

          cd $GITHUB_WORKSPACE
          rm -rf $TEMP_DIR

      - name: Generate checksum
        run: |
          cd build/outputs
          sha256sum sio-android-scx-release.aar > sio-android-scx-release.aar.sha256

      - name: Copy license files to release output
        run: |
          cp LICENSE build/outputs/LICENSE.txt
          cp NOTICE build/outputs/NOTICE.txt

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: |
            ## SCX Socket.IO Client v${{ github.event.inputs.version }}

            Modified and prefixed distribution of Socket.IO Client for Java.

            **Important**: This is not an official Socket.IO release. This distribution includes Socket.IO Client and its dependencies with package relocation applied.

            ### Features
            - Java package prefix: `cx.smile.`
            - All transitive dependencies relocated (OkHttp, Okio, org.json)
            - Bundled as single AAR for easy integration

            ### Installation

            #### Via JitPack
            ```gradle
            repositories {
                maven { url 'https://jitpack.io' }
            }

            dependencies {
                implementation 'com.github.smile-cx:sio-android-scx:v${{ github.event.inputs.version }}'
            }
            ```

            #### Direct Download
            Download the AAR from the assets below.

            ### License and Attribution
            This distribution bundles modified third-party software. See LICENSE.txt and NOTICE.txt in the release assets for complete license texts and attribution notices.

            ### Bundled Components
            - Socket.IO Client for Java v${{ github.event.inputs.version }} (MIT)
            - Engine.IO Client for Java (MIT)
            - OkHttp (Apache 2.0)
            - Okio (Apache 2.0)
            - JSON in Java (Custom License)

            All components are redistributed with package relocation applied via Gradle Shadow plugin.

            ### Checksums
            See `sio-android-scx-release.aar.sha256` for SHA-256 checksum.
          files: |
            build/outputs/sio-android-scx-release.aar
            build/outputs/sio-android-scx-release.aar.sha256
            build/outputs/LICENSE.txt
            build/outputs/NOTICE.txt
          draft: false
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sio-android-scx-aar
          path: build/outputs/sio-android-scx-release.aar
          retention-days: 30
