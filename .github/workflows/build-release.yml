name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.1.0)'
        required: true
        default: '2.1.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if release exists
        id: check_release
        run: |
          VERSION="v${{ github.event.inputs.version }}"

          # Check if release exists
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION exists, checking if AAR is already shadowed..."

            # Try to download existing AAR
            if gh release download "$VERSION" -p "sio-android-scx-release.aar" --clobber 2>/dev/null; then
              echo "✓ Found existing AAR in release"

              # Check if already shadowed
              mkdir -p check
              unzip -q sio-android-scx-release.aar libs/shadow.jar -d check/ 2>/dev/null || true

              if [ -f "check/libs/shadow.jar" ] && jar -tf check/libs/shadow.jar | grep -q "cx/smile/io/socket"; then
                echo "✓ AAR is already shadowed - skipping build"
                echo "already_shadowed=true" >> $GITHUB_OUTPUT
                echo "skip_build=true" >> $GITHUB_OUTPUT
              else
                echo "AAR exists but not properly shadowed - will rebuild"
                echo "already_shadowed=false" >> $GITHUB_OUTPUT
                echo "skip_build=false" >> $GITHUB_OUTPUT
              fi

              rm -rf check/
            else
              echo "Release exists but no AAR found - will build"
              echo "skip_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Release does not exist - will build"
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up JDK 17
        if: steps.check_release.outputs.skip_build != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        if: steps.check_release.outputs.skip_build != 'true'
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        if: steps.check_release.outputs.skip_build != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make scripts executable
        if: steps.check_release.outputs.skip_build != 'true'
        run: chmod +x scripts/*.sh

      - name: Build release AAR
        if: steps.check_release.outputs.skip_build != 'true'
        run: ./scripts/build-release.sh
        env:
          UPSTREAM_VERSION: ${{ github.event.inputs.version }}

      - name: Verify AAR contents
        if: steps.check_release.outputs.skip_build != 'true'
        run: |
          echo "=== AAR Contents ==="
          unzip -l build/outputs/sio-android-scx-release.aar
          echo ""
          echo "=== Verifying package prefixes ==="
          # Extract shadow.jar from AAR and check for prefixed classes
          TEMP_DIR=$(mktemp -d)
          cd $TEMP_DIR
          unzip -q $GITHUB_WORKSPACE/build/outputs/sio-android-scx-release.aar libs/shadow.jar

          # Check for prefixed classes
          PREFIXED_COUNT=$(jar tf libs/shadow.jar | grep -c "cx/smile/" || echo "0")
          echo "Found $PREFIXED_COUNT prefixed classes (cx/smile/)"

          # Check for Socket.IO classes
          SOCKET_COUNT=$(jar tf libs/shadow.jar | grep -c "cx/smile/io/socket/" || echo "0")
          echo "Socket.IO classes: $SOCKET_COUNT"

          # Sample of prefixed classes
          echo ""
          echo "=== Sample Prefixed Classes ==="
          jar tf libs/shadow.jar | grep "cx/smile/io/socket/client" | head -10

          # Check for unprefixed classes (should be empty)
          echo ""
          echo "=== Checking for unprefixed classes (should be empty) ==="
          UNPREFIXED=$(jar tf libs/shadow.jar | grep -E "^(io/socket|io/engine|okhttp3|okio)/" || echo "")
          if [ -z "$UNPREFIXED" ]; then
            echo "✓ No unprefixed classes found"
          else
            echo "✗ ERROR: Found unprefixed classes:"
            echo "$UNPREFIXED"
            exit 1
          fi

          cd $GITHUB_WORKSPACE
          rm -rf $TEMP_DIR

      - name: Generate checksum
        if: steps.check_release.outputs.skip_build != 'true'
        run: |
          cd build/outputs
          sha256sum sio-android-scx-release.aar > sio-android-scx-release.aar.sha256

      - name: Copy license files to release output
        if: steps.check_release.outputs.skip_build != 'true'
        run: |
          cp LICENSE build/outputs/LICENSE.txt
          cp NOTICE build/outputs/NOTICE.txt

      - name: Create and push tag
        if: steps.check_release.outputs.skip_build != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create Release
        if: steps.check_release.outputs.skip_build != 'true'
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: |
            ## SCX Socket.IO Client v${{ github.event.inputs.version }}

            Modified distribution of Socket.IO Client for Java with package relocation.

            **Important**: This is not an official Socket.IO release. This distribution includes Socket.IO Client and its dependencies with package relocation applied.

            ### Features
            - Java package prefix: `cx.smile.`
            - All transitive dependencies relocated (OkHttp, Okio)
            - Uses `org.json` from Android SDK
            - Bundled as single AAR for easy integration

            ### Installation

            #### Via JitPack
            ```gradle
            repositories {
                maven { url 'https://jitpack.io' }
            }

            dependencies {
                implementation 'com.github.smile-cx:sio-android-scx:v${{ github.event.inputs.version }}'
            }
            ```

            #### Direct Download
            Download the AAR from the assets below.

            ### License and Attribution
            This distribution bundles modified third-party software. See LICENSE.txt and NOTICE.txt in the release assets for complete license texts and attribution notices.

            ### Bundled Components
            - Socket.IO Client for Java v${{ github.event.inputs.version }} (MIT)
            - Engine.IO Client for Java (MIT)
            - OkHttp (Apache 2.0)
            - Okio (Apache 2.0)

            All components are redistributed with package relocation applied via Gradle Shadow plugin.

            **Note:** Uses `org.json` from Android SDK (not bundled).

            ### Checksums
            See `sio-android-scx-release.aar.sha256` for SHA-256 checksum.
          files: |
            build/outputs/sio-android-scx-release.aar
            build/outputs/sio-android-scx-release.aar.sha256
            build/outputs/LICENSE.txt
            build/outputs/NOTICE.txt
          draft: false
          prerelease: false

      - name: Upload build artifacts
        if: steps.check_release.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sio-android-scx-aar
          path: build/outputs/sio-android-scx-release.aar
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_release.outputs.skip_build }}" = "true" ]; then
            echo "✓ Release v${{ github.event.inputs.version }} already exists with shadowed AAR" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status**: Skipped build (AAR already shadowed)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View release: https://github.com/${{ github.repository }}/releases/tag/v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Successfully built and released Socket.IO v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Artifacts Created" >> $GITHUB_STEP_SUMMARY
            echo "- \`sio-android-scx-release.aar\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`sio-android-scx-release.aar.sha256\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`LICENSE.txt\` and \`NOTICE.txt\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Release" >> $GITHUB_STEP_SUMMARY
            echo "✅ Release created: https://github.com/${{ github.repository }}/releases/tag/v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### JitPack" >> $GITHUB_STEP_SUMMARY
            echo "The release will be available on JitPack shortly:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`gradle" >> $GITHUB_STEP_SUMMARY
            echo "implementation 'com.github.smile-cx:sio-android-scx:v${{ github.event.inputs.version }}'" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
