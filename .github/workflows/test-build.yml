name: Test Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Run build
        run: ./scripts/build-release.sh

      - name: Verify package prefixing
        run: |
          echo "=== Verifying package prefixes ==="
          # Extract shadow.jar from AAR
          TEMP_DIR=$(mktemp -d)
          cd $TEMP_DIR
          unzip -q $GITHUB_WORKSPACE/build/outputs/sio-android-scx-release.aar libs/shadow.jar

          # Check for prefixed classes
          echo "Sample prefixed classes:"
          jar tf libs/shadow.jar | grep "cx/smile/io/socket/client" | head -10

          # Check for unprefixed classes
          echo ""
          echo "=== Checking for unprefixed classes (should be empty) ==="
          UNPREFIXED=$(jar tf libs/shadow.jar | grep -E "^(io/socket|io/engine|okhttp3|okio)/" || echo "")
          if [ -z "$UNPREFIXED" ]; then
            echo "✓ No unprefixed classes found"
          else
            echo "✗ ERROR: Found unprefixed classes"
            exit 1
          fi

          cd $GITHUB_WORKSPACE
          rm -rf $TEMP_DIR

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-build-aar
          path: build/outputs/sio-android-scx-release.aar
          retention-days: 7
