name: Test Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Run build
        run: ./scripts/build-release.sh

      - name: Verify package prefixing
        run: |
          echo "=== Verifying package prefixes ==="
          unzip -p build/outputs/sio-android-scx-release.aar classes.jar | jar tf - | grep -E "^cx/smile/" | head -20
          echo ""
          echo "=== Checking for unprefixed classes (should be empty) ==="
          unzip -p build/outputs/sio-android-scx-release.aar classes.jar | jar tf - | grep -E "^io/socket/" | head -10 || echo "✓ No unprefixed classes found"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-build-aar
          path: build/outputs/sio-android-scx-release.aar
          retention-days: 7
